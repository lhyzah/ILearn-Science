<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Pedigree analysis chart</title>
  <desc id="desc">A genetic pedigree chart with family symbols and inheritance lines.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#1a2132"/>
      <stop offset="1" stop-color="#10131a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g stroke="#3cd7ff" stroke-opacity=".18" fill="none">
    <path d="M60 130h160M580 130h160M70 420h210M535 420h210"/>
    <circle cx="717" cy="91" r="4"/><circle cx="88" cy="365" r="5"/><circle cx="642" cy="390" r="3"/>
  </g>
  <g transform="translate(155 112)" stroke="#a8e8ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="68" y="0" width="60" height="60" rx="6" fill="#00d4ff" fill-opacity=".22"/>
    <circle cx="208" cy="30" r="30" fill="none"/>
    <path d="M128 30h50M153 30v55M93 85h275M93 85v48M230 85v48M368 85v48"/>
    <circle cx="93" cy="163" r="30" fill="#e9ddff" fill-opacity=".2"/>
    <rect x="200" y="133" width="60" height="60" rx="6" fill="none"/>
    <circle cx="368" cy="163" r="30" fill="#00d4ff" fill-opacity=".35"/>
    <path d="M230 193v55M92 248h276M92 248v48M230 248v48M368 248v48"/>
    <rect x="62" y="296" width="60" height="60" rx="6" fill="#00d4ff" fill-opacity=".35"/>
    <circle cx="230" cy="326" r="30" fill="none"/>
    <rect x="338" y="296" width="60" height="60" rx="6" fill="none"/>
    <path d="M47 390h380" stroke="#74f5ff" stroke-width="2" stroke-dasharray="9 12" opacity=".65"/>
  </g>
  <g font-family="Sora, Arial, sans-serif" fill="#e1e2eb">
    <text x="48" y="70" font-size="36" font-weight="700">Pedigree Analysis</text>
    <text x="50" y="106" font-size="17" fill="#bbc9cf">Read family traits, carriers, and inheritance patterns</text>
    <g font-family="JetBrains Mono, monospace" font-size="15" fill="#74f5ff">
      <text x="560" y="188">square = male</text>
      <text x="560" y="218">circle = female</text>
      <text x="560" y="248">filled = affected</text>
      <text x="560" y="278">line = relationship</text>
    </g>
  </g>
</svg>
